<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticker Mundial 2026 – El Colombiano</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    font-family: 'Arial Narrow', Arial, sans-serif;
    overflow: hidden;
    height: 46px;
  }

  .ticker-wrap {
    width: 100%;
    height: 46px;
    background: #ffffff;
    border-top: 2px solid #D20A11;
    border-bottom: 2px solid #D20A11;
    display: flex;
    align-items: stretch;
    overflow: hidden;
    position: relative;
  }

  /* ── Badge fijo izquierda (sin logo) ── */
  .ticker-brand {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    padding: 0 14px 0 12px;
    background: #ffffff;
    border-right: 1.5px solid #e0e0e0;
    z-index: 10;
  }

  .wc-badge {
    background: #D20A11;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 5px 10px;
    border-radius: 3px;
    text-transform: uppercase;
    white-space: nowrap;
    line-height: 1.3;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── Track ── */
  .ticker-track-wrap {
    flex: 1;
    overflow: hidden;
    display: flex;
    align-items: center;
    position: relative;
  }

  .ticker-track-wrap::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 20px;
    background: linear-gradient(to right, #ffffff, transparent);
    z-index: 2;
    pointer-events: none;
  }
  .ticker-track-wrap::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 20px;
    background: linear-gradient(to left, #ffffff, transparent);
    z-index: 2;
    pointer-events: none;
  }

  .ticker-track {
    display: flex;
    align-items: center;
    white-space: nowrap;
    animation: ticker-scroll 80s linear infinite;
    will-change: transform;
  }

  .ticker-track:hover {
    animation-play-state: paused;
  }

  @keyframes ticker-scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ── Items ── */
  .ticker-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 0 18px;
    height: 46px;
    font-size: 15px;
    color: #222;
  }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #D20A11;
    background: #fff0f0;
    padding: 2px 7px;
    border-radius: 2px;
  }

  .live-dot {
    width: 7px;
    height: 7px;
    background: #D20A11;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }

  .live-label {
    color: #D20A11;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .minute {
    color: #D20A11;
    font-size: 12px;
    font-weight: 700;
  }

  .team {
    color: #111;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.02em;
  }

  .score {
    color: #111;
    font-weight: 700;
    font-size: 15px;
    background: #f0f0f0;
    padding: 1px 8px;
    border-radius: 2px;
    min-width: 38px;
    text-align: center;
  }

  .score.live {
    background: #D20A11;
    color: #fff;
  }

  .vs {
    color: #aaa;
    font-size: 13px;
  }

  .time {
    color: #888;
    font-size: 13px;
  }

  .flag {
    font-size: 18px;
    line-height: 1;
  }

  .col-highlight {
    background: #FDD835;
    color: #111;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 4px;
    border-radius: 2px;
    letter-spacing: 0.05em;
  }

  .channel {
    color: #999;
    font-size: 13px;
  }

  .channel strong {
    color: #333;
    font-weight: 700;
  }

  .final-label {
    color: #888;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .sep {
    color: #D20A11;
    font-size: 15px;
    opacity: 0.35;
    padding: 0 4px;
  }
</style>
</head>
<body>

<div class="ticker-wrap">

  <!-- Badge fijo izquierda -->
  <div class="ticker-brand">
    <span class="wc-badge">⚽ Mundial 2026</span>
  </div>

  <!-- Track infinito -->
  <div class="ticker-track-wrap">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>

</div>

<script>
const DATA_URL = 'https://andresleon2712-art.github.io/mundial-ticker-ec/data.json';
const REFRESH_MS = 60000;

const FLAGS = {
  MEX:'🇲🇽', RSA:'🇿🇦', KOR:'🇰🇷', CZE:'🇨🇿', COL:'🇨🇴', CAN:'🇨🇦',
  BRA:'🇧🇷', ARG:'🇦🇷', USA:'🇺🇸', ESP:'🇪🇸', FRA:'🇫🇷', GER:'🇩🇪',
  POR:'🇵🇹', ENG:'🇬🇧', URU:'🇺🇾', ECU:'🇪🇨', CHI:'🇨🇱', PER:'🇵🇪',
  BOL:'🇧🇴', PAR:'🇵🇾', VEN:'🇻🇪', MAR:'🇲🇦', SEN:'🇸🇳', GHA:'🇬🇭',
  NGA:'🇳🇬', CMR:'🇨🇲', TUN:'🇹🇳', EGY:'🇪🇬', JPN:'🇯🇵', AUS:'🇦🇺',
  IRN:'🇮🇷', SAU:'🇸🇦', QAT:'🇶🇦', NED:'🇳🇱', BEL:'🇧🇪', SUI:'🇨🇭',
  CRO:'🇭🇷', SRB:'🇷🇸', DEN:'🇩🇰', POL:'🇵🇱', SWE:'🇸🇪', AUT:'🇦🇹',
  BIH:'🇧🇦', SLO:'🇸🇮', GRE:'🇬🇷', PAR:'🇵🇾', HON:'🇭🇳',
};

const CH_DEFAULT = 'RCN · Caracol · Win+';
const CH_COL     = 'RCN · Caracol · Win+ · Max';

function toHoraColombia(utcStr) {
  return new Date(utcStr).toLocaleTimeString('es-CO', {
    hour: '2-digit', minute: '2-digit', timeZone: 'America/Bogota'
  });
}

function toFechaColombia(utcStr) {
  return new Date(utcStr).toLocaleDateString('es-CO', {
    day: 'numeric', month: 'short', timeZone: 'America/Bogota'
  });
}

function f(code) { return FLAGS[code] || '🏳'; }
function sep() { return '<span class="sep">•</span>'; }

function buildItems(data) {
  const items = [];
  const matches = data.matches || [];

  const live     = matches.filter(m => m.status === 'IN_PLAY' || m.status === 'PAUSED');
  const finished = matches.filter(m => m.status === 'FINISHED');
  const upcoming = matches.filter(m => m.status === 'SCHEDULED' || m.status === 'TIMED');

  // ── EN VIVO ──
  live.forEach((m, i) => {
    const isCol = m.homeTeam.tla === 'COL' || m.awayTeam.tla === 'COL';
    const colBadge = isCol ? `<span class="col-highlight">COL</span>` : '';
    const min = m.minute ? `<span class="minute">${m.minute}'</span>` : '';
    if (i === 0) items.push(`<div class="ticker-item"><span class="section-label">En vivo</span></div>`);
    items.push(`
      <div class="ticker-item">
        <span class="live-dot"></span>
        <span class="live-label">Live</span>
        ${min} ${colBadge}
        <span class="flag">${f(m.homeTeam.tla)}</span>
        <span class="team">${m.homeTeam.tla}</span>
        <span class="score live">${m.score.fullTime.home ?? 0}–${m.score.fullTime.away ?? 0}</span>
        <span class="team">${m.awayTeam.tla}</span>
        <span class="flag">${f(m.awayTeam.tla)}</span>
        <span class="channel">Ver en <strong>${isCol ? CH_COL : CH_DEFAULT}</strong></span>
      </div>
    `);
  });

  // ── RESULTADOS ──
  finished.forEach((m, i) => {
    const isCol = m.homeTeam.tla === 'COL' || m.awayTeam.tla === 'COL';
    const colBadge = isCol ? `<span class="col-highlight">COL</span>` : '';
    if (i === 0) items.push(`<div class="ticker-item">${sep()}<span class="section-label">Resultados</span></div>`);
    items.push(`
      <div class="ticker-item">
        ${colBadge}
        <span class="flag">${f(m.homeTeam.tla)}</span>
        <span class="team">${m.homeTeam.tla}</span>
        <span class="score">${m.score.fullTime.home}–${m.score.fullTime.away}</span>
        <span class="team">${m.awayTeam.tla}</span>
        <span class="flag">${f(m.awayTeam.tla)}</span>
        <span class="final-label">Final</span>
        <span class="time">${toFechaColombia(m.utcDate)}</span>
      </div>
    `);
  });

  // ── PRÓXIMOS ──
  upcoming.slice(0, 8).forEach((m, i) => {
    const isCol = m.homeTeam.tla === 'COL' || m.awayTeam.tla === 'COL';
    const colBadge = isCol ? `<span class="col-highlight">COL</span>` : '';
    if (i === 0) items.push(`<div class="ticker-item">${sep()}<span class="section-label">Próximos</span></div>`);
    items.push(`
      <div class="ticker-item">
        ${colBadge}
        <span class="flag">${f(m.homeTeam.tla)}</span>
        <span class="team">${m.homeTeam.tla}</span>
        <span class="vs">vs</span>
        <span class="team">${m.awayTeam.tla}</span>
        <span class="flag">${f(m.awayTeam.tla)}</span>
        <span class="time">${toHoraColombia(m.utcDate)}</span>
        <span class="channel">Ver en <strong>${isCol ? CH_COL : CH_DEFAULT}</strong></span>
      </div>
    `);
  });

  if (items.length === 0) {
    items.push(`
      <div class="ticker-item">
        <span class="flag">🏆</span>
        <span class="team">Mundial 2026</span>
        <span class="time">· México vs Sudáfrica 2:00 pm · Corea del Sur vs Rep. Checa 9:00 pm</span>
        <span class="channel">&nbsp;Ver en <strong>RCN · Caracol · Win+</strong></span>
      </div>
    `);
  }

  return items;
}

async function loadTicker() {
  const track = document.getElementById('tickerTrack');
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    const data = await res.json();
    const items = buildItems(data);
    const html = items.join('');
    track.innerHTML = html + html;
    const dur = Math.max(25, (track.scrollWidth / 2) / 140);
    track.style.animationDuration = dur + 's';
  } catch(e) {
    const fallback = `
      <div class="ticker-item">
        <span class="flag">🏆</span>
        <span class="team">Mundial 2026</span>
        <span class="time">&nbsp;· México vs Sudáfrica 2:00 pm · Corea del Sur vs Rep. Checa 9:00 pm ·&nbsp;</span>
        <span class="channel">Ver en <strong>RCN · Caracol · Win+</strong></span>
      </div>`;
    track.innerHTML = fallback + fallback;
  }
}

loadTicker();
setInterval(loadTicker, REFRESH_MS);
</script>

</body>
</html>
