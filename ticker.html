<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Widget + Imágenes</title>

<!-- API SPORTS (carga el widget fuera de pantalla para extraer datos) -->
<script type="module" src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>

<style>

	/* ─── LAYOUT ─── */
	.contenedor-principal {
		display: flex;
		width: 100%;
		gap: 5px;
		align-items: stretch;
		margin-bottom: 30px;
	}


	/* ─── WIDGET FUENTE (oculto fuera de pantalla) ─── */
	#widget-source {
		position: absolute;
		left: -9999px;
		top: 0;
		width: 500px;
		height: 300px;
		overflow: hidden;
		visibility: visible;
	}

	/* El widget necesita inicializarse; le damos altura para que procese */
	#widget-source api-sports-widget.initialized {
		height: 250px !important;
	}

	/* ─── TICKER / MARQUEE ─── */
	.ticker-outer {
		width: 100%;
		height: 75px;
		background: #f1f1f1;
		display: flex;
		flex-direction: column;
		overflow: hidden;
	}

	.ticker-header {
		background: #ccd325;
		color: #000;
		font-family: Arial, sans-serif;
		font-size: 11px;
		font-weight: bold;
		text-transform: uppercase;
		letter-spacing: 1.5px;
		padding: 6px 12px;
		flex-shrink: 0;
	}

	.ticker-body {
		flex: 1;
		overflow: hidden;
		display: flex;
		align-items: center;
	}

	/* Animación derecha → izquierda (estilo ticker TV) */
	.ticker-track {
		display: flex;
		align-items: center;
		white-space: nowrap;
		animation: ticker-rtl 50s linear infinite;
		will-change: transform;
	}

	@keyframes ticker-rtl {
		0%   { transform: translateX(0%);   }
		100% { transform: translateX(-50%); }
	}

	/* Cada partido */
	.ticker-game {
		display: inline-flex;
		align-items: center;
		gap: 7px;
		padding: 0 24px;
		font-family: Arial, sans-serif;
	}

	/* Hora: blanco — FIN: verde */
	.ticker-time {
		color: #000;
		font-weight: bold;
		font-size: 13px;
		letter-spacing: 0.5px;
	}

	.ticker-time.fin {
		color: #5cb85c;
	}

	.ticker-time.vivo {
		color: #ff4444;
	}

	/* Bandera del equipo */
	.ticker-flag {
		width: 22px;
		height: 15px;
		object-fit: cover; 
		border-radius: 2px;
		flex-shrink: 0;
		vertical-align: middle;
	}

	.ticker-team {
		color: #000;
		font-size: 13px;
		font-weight: 500;
	}

	.ticker-score {
		color: #000;
		font-weight: bold;
		font-size: 15px;
		background: rgba(255, 255, 255, 0.08);
		border: 1px solid rgb(0 0 0 / 22%);
		padding: 2px 10px;
		border-radius: 3px;
		min-width: 40px;
		text-align: center;
		letter-spacing: 2px;
	}

	/* Separador entre partidos */
	.ticker-sep {
		color: #ccd325;
		font-size: 16px;
		padding: 0 4px;
		opacity: 0.45;
	}

	.ticker-loading {
		color: #888;
		padding: 0 30px;
		font-family: Arial, sans-serif;
		font-size: 13px;
	}

	/* ─── RESPONSIVE ─── */
	@media (max-width: 768px) {
		.contenedor-principal { flex-direction: column; margin-top: 20px; }
		.columna.imagen-2     { width: 100%; }
		.columna.widget-centro { width: 100%; }
		.columna.imagen-1     { width: 100%; }
		.bloque-imagen        { height: 90px; }
		.bloque-imagen img    { height: 90px; }
		.imagen-1  { order: 1; }
		.widget-centro { order: 2; }
		.imagen-2  { order: 3; }
		.ticker-outer { height: 90px; }
		.ticker-header { font-size: 10px; padding: 4px 8px; }
		.ticker-game { gap: 5px; padding: 0 14px; }
		.ticker-time, .ticker-team { font-size: 11px; }
		.ticker-score { font-size: 13px; padding: 1px 6px; }
		.ticker-flag { width: 18px; height: 12px; }
	}

</style>
</head>

<body>

<!-- ═══════════════════════════════════════════════════════
     WIDGET FUENTE — corre fuera de pantalla para cargar
     los datos. data-tab="games" activa la pestaña partidos.
     ═══════════════════════════════════════════════════════ -->
<div id="widget-source">
	<api-sports-widget
		data-type="league"
		data-league="1"
		data-season="2026"
		data-tab="games">
	</api-sports-widget>

	<api-sports-widget
		data-type="config"
		data-key="6a8c00a8cfcbf9c46a6c65d964bbd548"
		data-sport="football"
		data-lang="es"
		data-theme="dark"
		data-timezone="America/Bogota"
		data-show-errors="true"
		data-show-logos="true">
	</api-sports-widget>
</div>

<!-- ═══════════════════════════════════════════════════════
     CONTENEDOR PRINCIPAL
     ═══════════════════════════════════════════════════════ -->
<div class="contenedor-principal">

	<!-- TICKER MARCADORES -->
	<div class="columna widget-centro">
		<div class="ticker-outer">
			<div class="ticker-header">⚽&nbsp; Copa del Mundo 2026 &nbsp;·&nbsp; Partidos de hoy</div>
			<div class="ticker-body">
				<div class="ticker-track" id="ticker-track">
					<span class="ticker-loading">Cargando partidos…</span>
				</div>
			</div>
		</div>
	</div>

</div>

<script>
(function () {

	/* ── Fecha de hoy en Colombia (formato "DD/MM") ─────────────────── */
	function getTodayCO() {
		var parts = new Intl.DateTimeFormat('es-CO', {
			timeZone: 'America/Bogota',
			day:   '2-digit',
			month: '2-digit'
		}).formatToParts(new Date());
		var d = parts.find(function(p){ return p.type === 'day';   }).value;
		var m = parts.find(function(p){ return p.type === 'month'; }).value;
		return d + '/' + m;   // ej. "16/06"
	}

	/* ── ¿Es un partido de hoy? ─────────────────────────────────────── */
	function esHoy(gameEl, hoy) {
		var infos = gameEl.querySelector('.game-infos');
		if (!infos) return false;
		var spans = infos.querySelectorAll('span');
		// Sin spans de fecha → el widget lo muestra sin prefijo de día = hoy
		if (!spans.length) return true;
		// El primer span contiene "DD/MM HH:MM" para días distintos
		var txt = spans[0].textContent.trim();
		return txt.indexOf(hoy) === 0;
	}

	/* ── Etiqueta de hora/estado ────────────────────────────────────── */
	function etiqueta(gameEl) {
		var infos = gameEl.querySelector('.game-infos');
		if (!infos) return '';
		var cls = infos.className;
		if (cls.indexOf('status-finished') !== -1) return 'FIN';
		if (cls.indexOf('status-inprogress') !== -1 ||
		    cls.indexOf('status-1st')        !== -1 ||
		    cls.indexOf('status-2nd')        !== -1) {
			var blink = infos.querySelector('.blink');
			return blink ? blink.textContent.trim() + "'" : 'EN VIVO';
		}
		var spans = infos.querySelectorAll('span');
		if (spans.length) {
			var t = spans[0].textContent.trim();
			// "DD/MM HH:MM" → extraer solo hora
			return t.indexOf(' ') !== -1 ? t.split(' ')[1] : t;
		}
		return infos.textContent.trim();
	}

	/* ── Construir el ticker ─────────────────────────────────────────── */
	function buildTicker(partidos) {
		var track = document.getElementById('ticker-track');

		if (!partidos.length) {
			track.innerHTML = '<span class="ticker-loading">No hay partidos para hoy · Copa del Mundo 2026</span>';
			track.style.animation = 'none';
			return;
		}

		var html = partidos.map(function (g) {
			var hora      = etiqueta(g);
			var local     = (g.querySelector('.team-home .team-name') || {}).textContent || '';
			var visita    = (g.querySelector('.team-away .team-name') || {}).textContent || '';
			// Solo marcador general (score), NO score-home-half / score-away-half
			var golLocal  = (g.querySelector('.score-home .score')   || {}).textContent || '-';
			var golVisita = (g.querySelector('.score-away .score')   || {}).textContent || '-';

			// Banderas — src disponible aunque loading=lazy porque el src ya está asignado
			var imgLocal  = g.querySelector('.team-home img');
			var imgVisita = g.querySelector('.team-away img');
			var srcLocal  = imgLocal  ? (imgLocal.src  || imgLocal.getAttribute('src'))  : '';
			var srcVisita = imgVisita ? (imgVisita.src || imgVisita.getAttribute('src')) : '';
			var flagLocal  = srcLocal  ? '<img class="ticker-flag" src="' + srcLocal  + '" alt="">' : '';
			var flagVisita = srcVisita ? '<img class="ticker-flag" src="' + srcVisita + '" alt="">' : '';

			// Clase de color según estado
			var horaClase = 'ticker-time';
			if (hora === 'FIN')     horaClase += ' fin';
			else if (hora.indexOf("'") !== -1 || hora === 'EN VIVO') horaClase += ' vivo';

			return '<span class="ticker-game">' +
				'<span class="' + horaClase + '">' + hora.trim()                            + '</span>' +
				flagLocal +
				'<span class="ticker-team">'  + local.trim()                                + '</span>' +
				'<span class="ticker-score">' + golLocal.trim() + ' - ' + golVisita.trim() + '</span>' +
				flagVisita +
				'<span class="ticker-team">'  + visita.trim()                               + '</span>' +
				'</span>' +
				'<span class="ticker-sep">·</span>';
		}).join('');

		/* Duplicar para bucle infinito sin salto visible */
		track.innerHTML = html + html;

		/* Ajustar duración para velocidad constante (~65 px/s) */
		requestAnimationFrame(function () {
			var mitad = track.scrollWidth / 2;
			var dur   = Math.max(12, mitad / 65);
			track.style.animationDuration = dur.toFixed(1) + 's';
		});
	}

	/* ── Intentar extraer datos del widget ──────────────────────────── */
	function intentar(hoy) {
		var items = document.querySelectorAll('#widget-source game-item');
		if (!items.length) return false;
		var hoy_partidos = [];
		items.forEach(function (g) {
			if (esHoy(g, hoy)) hoy_partidos.push(g);
		});
		buildTicker(hoy_partidos);
		return true;
	}

	/* ── Iniciar observación + polling de respaldo ──────────────────── */
	function iniciar() {
		var hoy   = getTodayCO();
		var listo = false;

		var obs = new MutationObserver(function () {
			if (listo) return;
			if (intentar(hoy)) { listo = true; obs.disconnect(); }
		});

		var src = document.getElementById('widget-source');
		if (src) obs.observe(src, { childList: true, subtree: true });

		/* Polling cada 500 ms durante hasta 60 s */
		var intentos = 0;
		var poll = setInterval(function () {
			intentos++;
			if (listo || intentos > 120) { clearInterval(poll); return; }
			if (intentar(hoy)) { listo = true; clearInterval(poll); obs.disconnect(); }
		}, 500);
	}

	if (document.readyState === 'loading') {
		document.addEventListener('DOMContentLoaded', iniciar);
	} else {
		iniciar();
	}

})();
</script>

</body>
</html>
