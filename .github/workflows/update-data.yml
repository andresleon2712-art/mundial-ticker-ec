name: Actualizar datos Mundial 2026

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch datos del Mundial
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: node fetch-data.js

      - name: Commit y push data.json
        run: |
          git config user.name "mundial-bot"
          git config user.email "bot@elcolombiano.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Datos Mundial"
          git push
