name: Actualizar datos Mundial 2026

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch y guardar datos
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          curl -s \
            -H "X-Auth-Token: $FOOTBALL_API_KEY" \
            "https://api.football-data.org/v4/competitions/WC/matches?status=LIVE,IN_PLAY,PAUSED,FINISHED,SCHEDULED,TIMED" \
            -o data.json

      - name: Commit y push data.json
        run: |
          git config user.name "mundial-bot"
          git config user.email "bot@elcolombiano.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Datos Mundial"
          git push
